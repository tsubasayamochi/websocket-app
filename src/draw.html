<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Draw</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  touch-action: none;
  background: #f0f0f0;
}

#toolbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: #ffffff;
  padding: 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  z-index: 10;
}

.color-btn {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: 2px solid #ccc;
}

canvas {
  position: absolute;
  top: 70px;
  left: 0;
}

#sendBtn:disabled {
  opacity: 0.5;
}
</style>
</head>

<body>

<div id="toolbar">
  <!-- カラーパレット -->
  <button class="color-btn" style="background:#000000" onclick="setColor('#000000')"></button>
  <button class="color-btn" style="background:#ff0000" onclick="setColor('#ff0000')"></button>
  <button class="color-btn" style="background:#0000ff" onclick="setColor('#0000ff')"></button>
  <button class="color-btn" style="background:#00aa00" onclick="setColor('#00aa00')"></button>
  <button class="color-btn" style="background:#ffff00" onclick="setColor('#ffff00')"></button>
  <button class="color-btn" style="background:#ff00ff" onclick="setColor('#ff00ff')"></button>

  <!-- 操作ボタン -->
  <button onclick="setPen()">ペン</button>
  <button onclick="setEraser()">消しゴム</button>
  <button onclick="clearCanvas()">リセット</button>
  <button id="sendBtn" onclick="send()" disabled>送信</button>
</div>

<canvas id="c"></canvas>

<script>
// ■ WebSocket
const ws = new WebSocket(
  (location.protocol === "https:" ? "wss://" : "ws://") + location.host
);

// 接続状態管理
ws.onopen = () => {
  console.log("WebSocket接続OK");
  document.getElementById("sendBtn").disabled = false;
};

ws.onerror = (e) => {
  console.error("WebSocketエラー", e);
};

ws.onclose = () => {
  console.log("WebSocket切断");
  document.getElementById("sendBtn").disabled = true;
};

// ■ Canvas
const c = document.getElementById("c");
const ctx = c.getContext("2d");

// サイズ調整
function resizeCanvas() {
  c.width = window.innerWidth;
  c.height = window.innerHeight - 70;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

// 初期設定
ctx.lineWidth = 5;
ctx.lineCap = "round";
ctx.strokeStyle = "#000000";

let drawing = false;
let mode = "pen";
let isSending = false;

// ■ 色変更
function setColor(color){
  mode = "pen";
  ctx.strokeStyle = color;
  ctx.lineWidth = 5;
}

// ■ ペン
function setPen(){
  mode = "pen";
  ctx.lineWidth = 5;
}

// ■ 消しゴム
function setEraser(){
  mode = "eraser";
  ctx.lineWidth = 25;
}

// ■ 描画
c.addEventListener("pointerdown", (e) => {
  drawing = true;
  ctx.beginPath();
  ctx.moveTo(e.clientX, e.clientY - 70);
});

c.addEventListener("pointermove", (e) => {
  if (!drawing) return;

  if (mode === "pen") {
    ctx.globalCompositeOperation = "source-over";
  } else {
    ctx.globalCompositeOperation = "destination-out";
  }

  ctx.lineTo(e.clientX, e.clientY - 70);
  ctx.stroke();
});

window.addEventListener("pointerup", () => {
  drawing = false;
});

// ■ リセット
function clearCanvas(){
  ctx.clearRect(0, 0, c.width, c.height);
}

// ■ 空判定
function isCanvasEmpty() {
  const blank = document.createElement("canvas");
  blank.width = c.width;
  blank.height = c.height;
  return c.toDataURL() === blank.toDataURL();
}

// ■ 送信
function send(){
  const btn = document.getElementById("sendBtn");

  if (ws.readyState !== WebSocket.OPEN) {
    console.log("未接続");
    return;
  }

  // ■ 空チェック
  if (isCanvasEmpty()) {
    btn.innerText = "何も描いていません";
    setTimeout(() => {
      btn.innerText = "送信";
    }, 1000);
    return;
  }

  // ■ 連打防止
  if (isSending) return;
  isSending = true;
  btn.disabled = true;

  const data = c.toDataURL("image/png");
  console.log("送信:", data);

  ws.send(data);

  // ■ 送信後リセット
  clearCanvas();

  // ■ フィードバック
  btn.innerText = "送信完了！";

  setTimeout(() => {
    btn.innerText = "送信";
    btn.disabled = false;
    isSending = false;
  }, 1000);
}
</script>

</body>
</html>
