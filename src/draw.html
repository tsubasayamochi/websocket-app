<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Draw</title>

<style>
body {
  margin: 0;
  overflow: hidden; /* スクロール禁止 */
  touch-action: none; /* ★これが超重要（スマホのスクロール防止） */
  background: #f0f0f0;
}

#toolbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: #fff;
  padding: 10px;
  display: flex;
  gap: 10px;
  z-index: 10;
}

canvas {
  position: absolute;
  top: 60px;
  left: 0;
}
</style>
</head>

<body>

<div id="toolbar">
  <input type="color" id="colorPicker" value="#000000">
  <button onclick="setPen()">ペン</button>
  <button onclick="setEraser()">消しゴム</button>
  <button onclick="clearCanvas()">リセット</button>
  <button onclick="send()">送信</button>
</div>

<canvas id="c"></canvas>

<script>
const ws = new WebSocket(
  (location.protocol === "https:" ? "wss://" : "ws://") + location.host
);

const c = document.getElementById("c");
const ctx = c.getContext("2d");

// ■ キャンバスを画面いっぱいに
function resizeCanvas() {
  c.width = window.innerWidth;
  c.height = window.innerHeight - 60;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

// ■ 初期設定
ctx.lineWidth = 5;
ctx.lineCap = "round";
ctx.strokeStyle = "black";

let drawing = false;
let mode = "pen";

// ■ 描画
c.addEventListener("pointerdown", (e) => {
  drawing = true;
  ctx.beginPath();
  ctx.moveTo(e.clientX, e.clientY - 60);
});

c.addEventListener("pointermove", (e) => {
  if (!drawing) return;

  if (mode === "pen") {
    ctx.globalCompositeOperation = "source-over";
  } else {
    ctx.globalCompositeOperation = "destination-out"; // 消しゴム
  }

  ctx.lineTo(e.clientX, e.clientY - 60);
  ctx.stroke();
});

window.addEventListener("pointerup", () => {
  drawing = false;
});

const colorPicker = document.getElementById("colorPicker");

let mode = "pen";

// ペン
function setPen() {
  mode = "pen";
  ctx.lineWidth = 5;
}

// 消しゴム（太くする）
function setEraser() {
  mode = "eraser";
  ctx.lineWidth = 20; // ★ここで大きく
}

// 描画処理
c.addEventListener("pointermove", (e) => {
  if (!drawing) return;

  if (mode === "pen") {
    ctx.globalCompositeOperation = "source-over";
    ctx.strokeStyle = colorPicker.value; // ★色反映
  } else {
    ctx.globalCompositeOperation = "destination-out";
  }

  ctx.lineTo(e.clientX, e.clientY - 60);
  ctx.stroke();
});

// ■ リセット
function clearCanvas() {
  ctx.clearRect(0, 0, c.width, c.height);
}

// ■ 送信
function send(){
  const data = c.toDataURL("image/png");
  ws.send(data);
}
</script>

</body>
</html>
