<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Display</title>
</head>

<body style="background:white;">

<script>
const ws = new WebSocket(
  (location.protocol === "https:" ? "wss://" : "ws://") + location.host
);

// ★ 接続確認
ws.onopen = () => {
  console.log("Display: WebSocket接続OK");
};

ws.onerror = (e) => {
  console.error("Display: WebSocketエラー", e);
};

ws.onclose = () => {
  console.log("Display: 接続切断");
};

// ★ 受信確認
ws.onmessage = (e) => {
  console.log("受信:", e.data);
  show(e.data);
};

// ★ 表示
function show(src){
  const img = document.createElement("img");
  img.src = src;

  const baseSize = 80;
  const scale = 0.5 + Math.random();
  const size = baseSize * scale;

  const x = Math.random() * (window.innerWidth - size);
  const y = Math.random() * (window.innerHeight - size);

  // ■ 回転（-45〜45度）
  const angle = Math.random() * 90 - 45;

  img.style.position = "fixed";
  img.style.left = x + "px";
  img.style.top = y + "px";
  img.style.width = size + "px";
  img.style.zIndex = 9999;

  // ■ 初期状態（透明＋回転＋少し小さく）
  img.style.opacity = 0;
  img.style.transform = `rotate(${angle}deg) scale(0.8)`;

  document.body.appendChild(img);

  // ■ 既存画像と重なりチェック
  const newRect = {
    left: x,
    top: y,
    right: x + size,
    bottom: y + size
  };

  const images = document.querySelectorAll("img");

  images.forEach(oldImg => {
    if (oldImg === img) return;

    const rect = oldImg.getBoundingClientRect();

    const overlap =
      newRect.left < rect.right &&
      newRect.right > rect.left &&
      newRect.top < rect.bottom &&
      newRect.bottom > rect.top;

    if (overlap) {
      fadeOut(oldImg);
    }
  });

  // ■ フェードイン
  setTimeout(() => {
    img.style.transition = "all 0.4s ease-out";
    img.style.opacity = 1;
    img.style.transform = `rotate(${angle}deg) scale(1)`;
  }, 10);
}
// ★ フェードアウト
function fadeOut(el){
  el.style.transition = "opacity 0.6s";
  el.style.opacity = 0;

  setTimeout(() => {
    el.remove();
  }, 600);
}
</script>

</body>
</html>
