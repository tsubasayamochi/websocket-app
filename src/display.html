<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Display</title>
</head>

<body style="background:white;">

<script>
const ws = new WebSocket(
  (location.protocol === "https:" ? "wss://" : "ws://") + location.host
);

// ★ 接続確認
ws.onopen = () => {
  console.log("Display: WebSocket接続OK");
};

ws.onerror = (e) => {
  console.error("Display: WebSocketエラー", e);
};

ws.onclose = () => {
  console.log("Display: 接続切断");
};

// ★ 受信確認
ws.onmessage = (e) => {
  console.log("受信:", e.data);
  show(e.data);
};

// ★ 表示
function show(src){
  const img = document.createElement("img");
  img.src = src;

  const baseSize = 240;
  const scale = 1 + Math.random) * 0.5; // 0.5〜1.5倍
  const size = baseSize * scale;

  const x = Math.random() * (window.innerWidth - size);
  const y = Math.random() * (window.innerHeight - size);

  img.style.position = "absolute";
  img.style.left = x + "px";
  img.style.top = y + "px";
  img.style.width = size + "px";

  document.body.appendChild(img);
}
</script>

</body>
</html>
